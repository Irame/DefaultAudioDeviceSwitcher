id: com.github.irame.DefaultAudioDeviceSwitcher
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10
build-options:
  prepend-path: "/usr/lib/sdk/dotnet10/bin"
  append-ld-library-path: "/usr/lib/sdk/dotnet10/lib"
  prepend-pkg-config-path: "/usr/lib/sdk/dotnet10/lib/pkgconfig"

command: DefaultAudioDeviceSwitcher.Linux

finish-args:
  - --env=DOTNET_ROOT=/app/lib/dotnet
  # Support both X11 (fallback) and Wayland
  - --socket=fallback-x11
  - --socket=wayland
  # DBus session access for StatusNotifierItem (KDE/Wayland tray)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.ayatana.indicator.application
  # PulseAudio / PipeWire
  - --socket=pulseaudio
  # flatpak-spawn --host
  - --talk-name=org.freedesktop.Flatpak
  # for picking up the system theme
  - --filesystem=xdg-config/gtk-3.0:ro

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: dotnet
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/dotnet10/bin/install.sh

  - name: DefaultAudioDeviceSwitcher
    buildsystem: simple
    sources:
      - type: dir
        path: ..
      - ./nuget-sources.json
    build-commands:
      - dotnet publish DefaultAudioDeviceSwitcher.Linux/DefaultAudioDeviceSwitcher.Linux.csproj
          -c Release --no-self-contained --source ./nuget-sources
      - mkdir -p ${FLATPAK_DEST}/bin
      - cp -r DefaultAudioDeviceSwitcher.Linux/bin/Release/net10.0/publish/* ${FLATPAK_DEST}/bin
      - mkdir -p ${FLATPAK_DEST}/share/applications
      - install -m644 flatpak-assets/com.github.irame.DefaultAudioDeviceSwitcher.desktop
          ${FLATPAK_DEST}/share/applications/
      - mkdir -p ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps
      - install -m644 flatpak-assets/com.github.irame.DefaultAudioDeviceSwitcher.png
          ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/